services:
  - type: web
    name: secureinvest-ai
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 3000
